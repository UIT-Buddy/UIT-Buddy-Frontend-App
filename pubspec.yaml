name: uit_buddy_mobile
description: "UIT Buddy Mobile Application."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: "1.0.5+5"
environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  dio: ^5.9.0
  equatable: ^2.0.8
  freezed_annotation: ^3.1.0
  shared_preferences: ^2.5.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  fpdart: ^1.2.0
  get_it: ^9.2.0
  icons_plus: ^5.0.0
  flutter_secure_storage: ^10.0.0
  network_image_mock: ^2.1.1
  flutter_native_splash: ^2.4.7
  shimmer: ^3.0.0
  geolocator: ^14.0.2
  flutter_svg: ^2.2.3
  carousel_slider: ^5.1.2
  image_picker: ^1.1.2
  file_picker: ^10.1.9
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  freezed: ^3.1.0
  bloc_test: ^10.0.0
  json_serializable: ^6.11.2
  mockito: ^5.6.3
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/placeholder/
    - assets/images/sample/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic
flutter_native_splash:
  color: "#FEF2EC"
  image: null
  android: true
  ios: true

  android_12:
    color: "#FEF2EC"
    image: null

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"
