name: UIT Buddy AppMobile CD

on:
  workflow_run:
    workflows: ["UIT Buddy AppMobile CI"] 
    types:
      - completed
    branches:
      - main

jobs:
  deploy-to-play-store:
    name: Build AAB and Deploy to Play Store
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.38.6"
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Create google-services.json
        run: echo '${{ secrets.GG_SERVICES }}' > android/app/google-services.json

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create Runtime .env file
        run: |
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          echo "BASE_URL=${{ secrets.API_BASE_URL }}" >> .env

      - name: Decode Keystore and Setup key.properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storeFile=upload-keystore.jks" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - name: Build App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --build-name=v1.0.${{ github.run_number }} \
            --build-number=${{ github.run_number }} \
            --dart-define-from-file=.env

      - name: Upload to Google Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
          packageName: com.uit.buddy.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
        #   track: production
        #   status: draft   # Uploads as a draft so you can review before rollout